name: Daily Art (fxtwitter → JSON)

on:
  schedule:
    - cron: '30 2 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-daily-art:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest art
        run: node .github/scripts/art_scraper.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/daily-art.json public/art-archive.json public/art-archive/
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update daily art"
          git push
